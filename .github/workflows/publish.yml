name: Publish to PyPI

on:
  push:
    tags:
      - "v*"          # triggers on v1.2.0, v1.3.0, etc.

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for trusted publishing (no API token needed)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses PyPI Trusted Publishing — no API token stored in secrets.
        # Set up at: pypi.org → your project → Publishing → Add publisher
        # Publisher: GitHub Actions, repo: <you>/context-portability-tool, workflow: publish.yml
